name: Monthly Stats Collection

on:
  schedule:
    # 1st of month 21:00 KST = 12:00 UTC
    - cron: '0 12 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get install -y jq
          echo "DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Collect repo stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/aggregate-stats.sh monthly

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews/monthly/
          git diff --cached --quiet || git commit -m "stats: monthly ${DATE}"
          git push
